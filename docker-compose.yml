services:
  qdrant:
    image: qdrant/qdrant:v1.15.1
    restart: always
    ports:
      # Host port remapped from Qdrant's default 6333. Internal container port stays 6333, so QDRANT_PORT
      # and app<->qdrant traffic are unaffected; only host access (e.g. the dashboard) moves.
      - "6343:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
 
    env_file: ".env"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_data: